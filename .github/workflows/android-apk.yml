name: android-apk

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.2"
          cache: true
      - name: Fix Gradle Java Home (CI)
        run: |
          # Remove Windows-specific JDK path to allow CI to use setup-java's JDK
          sed -i '/org.gradle.java.home/d' life_chronicle/android/gradle.properties
      - name: Create signing config
        run: |
          # Create key.properties for release signing
          echo "storePassword=renshengbiannianshi9" > life_chronicle/android/key.properties
          echo "keyPassword=renshengbiannianshi9" >> life_chronicle/android/key.properties
          echo "keyAlias=life-chronicle" >> life_chronicle/android/key.properties
          echo "storeFile=life-chronicle-release.jks" >> life_chronicle/android/key.properties
      - name: Install Android SDK platforms
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "platforms;android-35" "platforms;android-31" "platforms;android-29" "build-tools;36.0.0" "ndk;28.2.13676358"
      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.dartServer
          key: ${{ runner.os }}-pub-${{ hashFiles('life_chronicle/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'life_chronicle/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Flutter Version
        run: flutter --version
        working-directory: life_chronicle
      - name: Pub get
        run: flutter pub get
        working-directory: life_chronicle
      - name: Verify local overrides
        run: |
          test -f .dart_tool/package_config.json
          grep -R "plugins/amap_flutter_base" .dart_tool/package_config.json
          grep -R "plugins/amap_flutter_location" .dart_tool/package_config.json
        working-directory: life_chronicle
      - name: Analyze
        run: flutter analyze
        working-directory: life_chronicle
      - name: Test with Coverage
        id: test
        continue-on-error: true
        run: |
          flutter test --coverage --file-reporter json:test-results.json || test_exit_code=$?
          test_exit_code=${test_exit_code:-0}
          if [ $test_exit_code -ne 0 ]; then
            echo "::warning::Tests failed with exit code $test_exit_code, but build will continue"
            if [ ! -f test-results.json ] || [ ! -s test-results.json ]; then
              echo '{"success": false, "testCount": 0, "tests": []}' > test-results.json
            fi
          fi
          echo "test_exit_code=$test_exit_code" >> $GITHUB_OUTPUT
        working-directory: life_chronicle
      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Flutter Tests
          path: life_chronicle/test-results.json
          reporter: flutter-json
          fail-on-error: false
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: life_chronicle/coverage/lcov.info
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: life_chronicle/test-results.json
      - name: Generate Friendly Test Report
        id: generate_report
        run: |
          dart run scripts/generate_friendly_test_report.dart
          echo "report_file=$(ls 测试报告_*.html 2>/dev/null | head -1 || echo 'test-report-latest.html')" >> $GITHUB_OUTPUT
        working-directory: life_chronicle
        if: always()
      - name: Upload Friendly Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: |
            life_chronicle/测试报告_*.html
            life_chronicle/test-report-latest.html
      - name: Build APK
        run: flutter build apk --release
        working-directory: life_chronicle
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: life_chronicle/build/app/outputs/flutter-apk/app-release.apk
