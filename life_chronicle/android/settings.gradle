pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
        }
        def sdkPath = properties.getProperty("flutter.sdk")
        if (sdkPath == null || sdkPath.trim().isEmpty()) {
            sdkPath = System.getenv("FLUTTER_ROOT")
        }
        assert sdkPath != null && !sdkPath.trim().isEmpty(), "flutter.sdk not set in local.properties and FLUTTER_ROOT is not set"
        return sdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.2.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}

include ":app"
