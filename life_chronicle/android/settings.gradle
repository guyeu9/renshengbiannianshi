pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        if (flutterSdkPath == null || flutterSdkPath.trim().isEmpty()) {
            flutterSdkPath = System.getenv("FLUTTER_ROOT")
        }
        assert flutterSdkPath != null && !flutterSdkPath.trim().isEmpty(), "flutter.sdk not set in local.properties and FLUTTER_ROOT is not set"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.2.2" apply false
    id "com.android.library" version "8.2.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.0" apply false
}

include ":app"
