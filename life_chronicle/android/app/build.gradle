def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty("flutter.sdk")
if (flutterRoot == null || flutterRoot.trim().isEmpty()) {
    flutterRoot = System.getenv("FLUTTER_ROOT")
}
assert flutterRoot != null && !flutterRoot.trim().isEmpty(), "Flutter SDK not found. Define location with flutter.sdk in local.properties or set FLUTTER_ROOT."

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

apply plugin: "com.android.application"
apply plugin: "kotlin-android"
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.suliuzhe.lifechronicle"
    compileSdk 35
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        applicationId "com.suliuzhe.lifechronicle"
        minSdk 21
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        ndk {
            abiFilters.addAll(["armeabi-v7a", "arm64-v8a"])
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
        debug {
            minifyEnabled false
        }
    }

    packaging {
        jniLibs {
            pickFirsts.addAll([
                "lib/arm64-v8a/libssl.so",
                "lib/arm64-v8a/libcrypto.so",
                "lib/armeabi-v7a/libssl.so",
                "lib/armeabi-v7a/libcrypto.so"
            ])
        }
    }
}

flutter {
    source "../.."
}

def amapSdkVersion = project.findProperty("AMAP_SDK_VERSION") ?: "10.0.600"

dependencies {
    implementation "com.amap.api:3dmap:$amapSdkVersion"
}
